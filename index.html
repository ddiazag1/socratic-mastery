<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socratic Mastery</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--surface:#0f172a;--surface2:#1e293b;--border:#334155;
  --text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--accent2:#60a5fa;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;--purple:#a855f7;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}

#app{max-width:900px;margin:0 auto;padding:16px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .nav{display:flex;gap:12px;align-items:center}
.header .nav a{color:var(--text2);font-size:13px;padding:4px 8px;border-radius:4px}
.header .nav a:hover{color:var(--text);background:var(--surface2);text-decoration:none}

.dash-streak{text-align:center;margin-bottom:24px;padding:16px;background:var(--surface);border-radius:8px;border:1px solid var(--border)}
.dash-streak .count{font-size:32px;font-weight:700;color:var(--accent2)}
.dash-streak .label{font-size:13px;color:var(--text2)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:24px}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}
.module-card:hover{border-color:var(--accent)}
.module-card h3{font-size:16px;margin-bottom:4px}
.module-card .subtitle{font-size:13px;color:var(--text2);margin-bottom:12px}
.module-card .stats{display:flex;gap:16px;margin-bottom:12px;font-size:13px}
.module-card .stats span{color:var(--text2)}
.module-card .stats strong{color:var(--text)}
.mastery-bar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;margin-bottom:12px;display:flex}
.mastery-bar .seg{height:100%;transition:width .3s}
.mastery-bar .seg.new{background:var(--border)}
.mastery-bar .seg.learning{background:var(--yellow)}
.mastery-bar .seg.review{background:var(--accent)}
.mastery-bar .seg.mastered{background:var(--green)}
.module-card .btn-start{display:block;width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600;text-align:center}
.module-card .btn-start:hover{background:var(--accent2)}
.weak-zones{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.weak-zones h3{font-size:15px;margin-bottom:8px}
.weak-zones .zone{display:inline-block;padding:4px 10px;background:rgba(239,68,68,.15);color:var(--red);border-radius:12px;font-size:12px;margin:2px 4px 2px 0}

/* Session */
.session-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.session-header .concept{font-size:14px;color:var(--accent2);font-weight:600}
.session-header .controls{display:flex;align-items:center;gap:8px}
.session-header .timer{font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums}
.session-header .btn-end{padding:6px 14px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600}
.session-header .btn-end:hover{opacity:.9}
.chat{display:flex;flex-direction:column;gap:12px;padding-bottom:100px;min-height:50vh}
.chat .msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word}
.chat .msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
.chat .msg.user{align-self:flex-end;background:var(--accent);color:#fff}
.chat .msg.assistant p{margin-bottom:8px}
.chat .msg.assistant p:last-child{margin-bottom:0}
.chat .msg.assistant code{background:var(--surface2);padding:1px 4px;border-radius:3px;font-size:13px}
.chat .msg.assistant pre{background:var(--surface2);padding:8px;border-radius:4px;overflow-x:auto;margin:8px 0}
.chat .msg.assistant pre code{background:none;padding:0}
.chat .typing{align-self:flex-start;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:13px}
.eval-flash{position:fixed;top:0;left:0;right:0;height:4px;animation:flash .8s ease-out;opacity:0;z-index:100}
.eval-flash.correct_confident{background:var(--green)}
.eval-flash.correct_hesitant{background:var(--yellow)}
.eval-flash.incorrect{background:var(--red)}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

/* Input bar */
.input-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px}
.input-bar form{max-width:900px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.input-bar textarea{flex:1;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);resize:none;min-height:42px;max-height:120px}
.input-bar textarea:focus{outline:none;border-color:var(--accent)}
.input-bar button[type="submit"]{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;min-height:42px}
.input-bar button:disabled{opacity:.5;cursor:not-allowed}

/* Mic button */
.btn-mic{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.btn-mic:hover{border-color:var(--accent);color:var(--text)}
.btn-mic.listening{border-color:var(--red);color:var(--red);animation:pulse 1.5s infinite}
.btn-mic svg{width:20px;height:20px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}

/* Hands-free toggle */
.btn-handsfree{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);white-space:nowrap;transition:all .2s}
.btn-handsfree.active{background:var(--green);color:#fff;border-color:var(--green)}
.btn-handsfree.active:hover{opacity:.9}

/* Hands-free listening overlay */
.hf-listening{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:2px solid var(--red);border-radius:16px;padding:12px 24px;display:flex;align-items:center;gap:10px;z-index:50;animation:pulse 1.5s infinite}
.hf-listening .dot{width:12px;height:12px;border-radius:50%;background:var(--red)}
.hf-listening .label{color:var(--text);font-size:14px;font-weight:600}

/* Speaking indicator */
.hf-speaking{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:12px 24px;display:flex;align-items:center;gap:10px;z-index:50}
.hf-speaking .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);animation:pulse-blue 1.5s infinite}
.hf-speaking .label{color:var(--text);font-size:14px;font-weight:600}
@keyframes pulse-blue{0%,100%{opacity:1}50%{opacity:.4}}

/* Summary */
.summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center}
.summary h2{margin-bottom:16px}
.summary .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.summary .stat{padding:12px}
.summary .stat .val{font-size:28px;font-weight:700}
.summary .stat .lbl{font-size:12px;color:var(--text2)}
.summary .stat .val.green{color:var(--green)}
.summary .stat .val.red{color:var(--red)}
.summary .stat .val.blue{color:var(--accent2)}
.summary button{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600}

/* Summary concept checklist */
.summary-concepts{text-align:left;margin:20px 0}
.summary-concepts h3{font-size:14px;color:var(--text2);margin-bottom:10px;text-align:center}
.summary-concept-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:background .2s;border:1px solid transparent}
.summary-concept-row:hover{border-color:var(--border)}
.summary-concept-row .eval-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.summary-concept-row .eval-dot.correct{background:var(--green)}
.summary-concept-row .eval-dot.incorrect{background:var(--red)}
.summary-concept-row .eval-dot.none{background:var(--border)}
.summary-concept-row .sc-name{flex:1;font-size:14px}
.summary-concept-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--yellow);cursor:pointer;flex-shrink:0}
.summary-concept-row .flag-label{font-size:11px;color:var(--yellow);font-weight:600}

/* Review banner */
.review-banner{background:linear-gradient(135deg,rgba(234,179,8,.15),rgba(239,68,68,.1));border:1px solid var(--yellow);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.review-banner .rb-text{font-size:14px}
.review-banner .rb-text strong{color:var(--yellow)}
.review-banner .rb-count{font-size:12px;color:var(--text2)}
.review-banner button{padding:8px 18px;background:var(--yellow);color:#000;border:none;border-radius:6px;font-weight:600;font-size:13px}

/* Progress */
.progress-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.progress-tabs button{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2)}
.progress-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.concept-list{display:flex;flex-direction:column;gap:8px}
.concept-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .2s}
.concept-row:hover{border-color:var(--accent)}
.concept-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.concept-row .dot.new{background:var(--border)}
.concept-row .dot.learning{background:var(--yellow)}
.concept-row .dot.review{background:var(--accent)}
.concept-row .dot.mastered{background:var(--green)}
.concept-row .name{flex:1;font-size:14px}
.concept-row .meta{font-size:12px;color:var(--text2)}
.due-forecast{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.due-forecast h3{font-size:15px;margin-bottom:8px}
.due-forecast .row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:var(--text2)}
.due-forecast .row strong{color:var(--text)}
.session-history{margin-top:16px}
.session-history h3{font-size:15px;margin-bottom:8px}
.session-row{display:flex;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:13px}

/* Concept Detail */
.concept-detail{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}
.concept-detail h2{margin-bottom:4px}
.concept-detail .cat{color:var(--text2);font-size:13px;margin-bottom:16px}
.concept-detail .desc{margin-bottom:16px;line-height:1.7;color:var(--text)}
.concept-detail .tags{margin-bottom:16px}
.concept-detail .tags span{display:inline-block;padding:2px 8px;background:var(--surface2);border-radius:10px;font-size:12px;color:var(--text2);margin:2px 4px 2px 0}
.concept-detail .sm2-state{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.concept-detail .sm2-state .item{padding:12px;background:var(--surface2);border-radius:6px}
.concept-detail .sm2-state .item .lbl{font-size:12px;color:var(--text2)}
.concept-detail .sm2-state .item .val{font-size:18px;font-weight:600}
.concept-detail .btn-drill{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600}

.loading{display:flex;justify-content:center;align-items:center;min-height:60vh;color:var(--text2)}

/* Sync setup */
.sync-wrap{display:flex;justify-content:center;align-items:center;min-height:80vh}
.sync-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:400px;text-align:center}
.sync-box h2{margin-bottom:8px}
.sync-box p{color:var(--text2);font-size:13px;margin-bottom:20px}
.sync-box input{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;text-align:center;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.sync-box input:focus{outline:none;border-color:var(--accent)}
.sync-box .btn-row{display:flex;gap:8px}
.sync-box button{flex:1;padding:10px;border:none;border-radius:6px;font-weight:600}
.sync-box .btn-new{background:var(--accent);color:#fff}
.sync-box .btn-join{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.sync-box .btn-join:hover{border-color:var(--accent)}
.sync-badge{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:4px;cursor:pointer}
.sync-badge:hover{color:var(--text)}

@media(max-width:600px){
  .module-grid{grid-template-columns:1fr}
  .summary .stat-grid{grid-template-columns:1fr}
  .concept-detail .sm2-state{grid-template-columns:1fr}
}
</style>
</head>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://vxtaghytxnycegztmrml.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4dGFnaHl0eG55Y2VnenRtcm1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTM2MzIsImV4cCI6MjA4NjY2OTYzMn0.3E0IFwp6LIcs7tChpj28jgaerf76zCB-oCbjRJkAtDU';
const TUTOR_URL = `${SUPABASE_URL}/functions/v1/socratic-tutor`;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');

const MODULE_LABELS = {
  ent_business: { name: 'ENT Business', icon: '\u{1F4BC}', desc: 'Revenue cycle, practice finance, operations, strategy' },
  neuro_boards: { name: 'Neuro Boards', icon: '\u{1F9E0}', desc: 'Spine, cranial, vascular, functional, trauma, critical care' },
  leadership: { name: 'Leadership', icon: '\u{1F3AF}', desc: 'Rhetoric, learning science, time management, entrepreneurship' },
};

const LS_PROGRESS = 'sm_progress';
const LS_SESSIONS = 'sm_sessions';
const LS_HANDSFREE = 'sm_handsfree';
const LS_SYNC_KEY = 'sm_sync_key';
const LS_FLAGGED = 'sm_flagged';
const LS_LAST_REVIEW = 'sm_last_review';
const FIXED_SYNC_KEY = 'DIAZ01';
const REVIEW_INTERVAL_DAYS = 3;

const MIC_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';

// ============================================================
// LOCAL STORAGE
// ============================================================
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ============================================================
// CLOUD SYNC
// ============================================================
function getSyncKey() { return FIXED_SYNC_KEY; }

let syncDebounce = null;
function cloudSave() {
  const key = getSyncKey();
  if (!key) return;
  if (syncDebounce) clearTimeout(syncDebounce);
  syncDebounce = setTimeout(async () => {
    try {
      await sb.from('sm_cloud_sync').upsert({
        sync_key: key,
        progress: { ...state.progress, _flagged: state.flagged, _lastReview: state.lastReviewDates },
        sessions: state.sessions,
        updated_at: new Date().toISOString(),
      }, { onConflict: 'sync_key' });
    } catch (e) { console.error('Cloud save failed:', e); }
  }, 1000);
}

async function cloudLoad() {
  const key = getSyncKey();
  if (!key) return false;
  try {
    const { data, error } = await sb.from('sm_cloud_sync').select('*').eq('sync_key', key).single();
    if (error || !data) return false;
    // Merge: cloud wins for progress (more recent last_reviewed), union for sessions
    const cloudProgress = data.progress || {};
    const cloudSessions = data.sessions || [];
    // Extract flagged/lastReview from cloud progress blob
    const cloudFlagged = cloudProgress._flagged || {};
    const cloudLastReview = cloudProgress._lastReview || {};
    delete cloudProgress._flagged;
    delete cloudProgress._lastReview;
    // Merge progress — keep whichever has a more recent last_reviewed
    for (const [id, cp] of Object.entries(cloudProgress)) {
      const lp = state.progress[id];
      if (!lp) { state.progress[id] = cp; continue; }
      const cloudTime = cp.last_reviewed ? new Date(cp.last_reviewed).getTime() : 0;
      const localTime = lp.last_reviewed ? new Date(lp.last_reviewed).getTime() : 0;
      if (cloudTime > localTime) state.progress[id] = cp;
    }
    // Merge flagged — union (if flagged anywhere, keep it)
    for (const [id, val] of Object.entries(cloudFlagged)) {
      if (val) state.flagged[id] = true;
    }
    // Merge lastReview — keep most recent per module
    for (const [mod, dateStr] of Object.entries(cloudLastReview)) {
      const cloudTime = new Date(dateStr).getTime();
      const localTime = state.lastReviewDates[mod] ? new Date(state.lastReviewDates[mod]).getTime() : 0;
      if (cloudTime > localTime) state.lastReviewDates[mod] = dateStr;
    }
    // Merge sessions — union by id
    const localIds = new Set(state.sessions.map(s => s.id));
    for (const cs of cloudSessions) {
      if (!localIds.has(cs.id)) state.sessions.push(cs);
    }
    lsSet(LS_PROGRESS, state.progress);
    lsSet(LS_SESSIONS, state.sessions);
    lsSet(LS_FLAGGED, state.flagged);
    lsSet(LS_LAST_REVIEW, state.lastReviewDates);
    return true;
  } catch (e) { console.error('Cloud load failed:', e); return false; }
}

// ============================================================
// STATE
// ============================================================
let state = {
  concepts: [],
  progress: lsGet(LS_PROGRESS, {}),
  sessions: lsGet(LS_SESSIONS, []),
  flagged: lsGet(LS_FLAGGED, {}), // { conceptId: true }
  lastReviewDates: lsGet(LS_LAST_REVIEW, {}), // { module: ISO date }
  activeSession: null,
  activeModule: null,
  sessionConcepts: [],
  currentConceptIdx: 0,
  messages: [],
  chatDisplay: [],
  sessionTimer: 0,
  timerInterval: null,
  sending: false,
  sessionEvals: {}, // { conceptId: 'correct'|'incorrect' } — tracks evals during current session
  // Audio
  handsFree: lsGet(LS_HANDSFREE, false),
  listening: false,
  speaking: false,
};

function saveProgress() { lsSet(LS_PROGRESS, state.progress); cloudSave(); }
function saveSessions() { lsSet(LS_SESSIONS, state.sessions); cloudSave(); }
function saveFlagged() { lsSet(LS_FLAGGED, state.flagged); cloudSave(); }
function saveLastReview() { lsSet(LS_LAST_REVIEW, state.lastReviewDates); cloudSave(); }

function isReviewDue(module) {
  const last = state.lastReviewDates[module];
  if (!last) {
    // Only show review if there are flagged/missed concepts to review
    return getReviewConcepts(module).length > 0;
  }
  const daysSince = (Date.now() - new Date(last).getTime()) / 86400000;
  return daysSince >= REVIEW_INTERVAL_DAYS && getReviewConcepts(module).length > 0;
}

function getReviewConcepts(module) {
  const concepts = state.concepts.filter(c => c.module === module);
  const review = [];
  const seen = new Set();
  // Flagged concepts
  concepts.forEach(c => {
    if (state.flagged[c.id]) { review.push(c); seen.add(c.id); }
  });
  // Concepts with 2+ incorrect that aren't mastered
  concepts.forEach(c => {
    if (seen.has(c.id)) return;
    const p = getProgress(c.id);
    if (p.times_incorrect >= 2 && p.state !== 'mastered') { review.push(c); }
  });
  return review;
}

// ============================================================
// SPEECH: TEXT-TO-SPEECH
// ============================================================
function stripMarkdown(md) {
  const div = document.createElement('div');
  div.innerHTML = marked.parse(md);
  return div.textContent || '';
}

function speak(text, onDone) {
  if (!('speechSynthesis' in window)) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  const plain = stripMarkdown(text);
  // Split long text into chunks (speechSynthesis can cut off long utterances)
  const chunks = [];
  const sentences = plain.split(/(?<=[.!?])\s+/);
  let current = '';
  for (const s of sentences) {
    if ((current + ' ' + s).length > 200) {
      if (current) chunks.push(current.trim());
      current = s;
    } else {
      current += (current ? ' ' : '') + s;
    }
  }
  if (current) chunks.push(current.trim());
  if (!chunks.length) { if (onDone) onDone(); return; }

  state.speaking = true;
  updateAudioIndicators();

  let idx = 0;
  function speakNext() {
    if (idx >= chunks.length) {
      state.speaking = false;
      updateAudioIndicators();
      if (onDone) onDone();
      return;
    }
    const utt = new SpeechSynthesisUtterance(chunks[idx]);
    utt.rate = 1.05;
    utt.onend = () => { idx++; speakNext(); };
    utt.onerror = () => { idx++; speakNext(); };
    window.speechSynthesis.speak(utt);
  }
  speakNext();
}

function stopSpeaking() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  state.speaking = false;
  updateAudioIndicators();
}

// ============================================================
// SPEECH: SPEECH-TO-TEXT
// ============================================================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognitionTimeout = null;

function initRecognition() {
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  return r;
}

function startListening() {
  if (!SpeechRecognition) { alert('Speech recognition not supported in this browser. Use Chrome.'); return; }
  stopSpeaking();
  if (recognition) { try { recognition.abort(); } catch {} }
  recognition = initRecognition();
  let finalTranscript = '';
  let lastResultTime = Date.now();

  recognition.onresult = (e) => {
    lastResultTime = Date.now();
    let interim = '';
    finalTranscript = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const input = document.getElementById('chatInput');
    if (input) input.value = finalTranscript + interim;
  };

  recognition.onend = () => {
    state.listening = false;
    updateAudioIndicators();
    // In hands-free mode, auto-send if we have text
    const input = document.getElementById('chatInput');
    if (input && input.value.trim() && state.handsFree && !state.sending) {
      sendMessage(input.value.trim());
      input.value = '';
    }
  };

  recognition.onerror = (e) => {
    console.log('Speech recognition error:', e.error);
    state.listening = false;
    updateAudioIndicators();
    // In hands-free mode, restart listening on 'no-speech' error
    if (state.handsFree && e.error === 'no-speech' && state.activeSession) {
      setTimeout(() => { if (state.handsFree && !state.sending && !state.speaking) startListening(); }, 1000);
    }
  };

  recognition.start();
  state.listening = true;
  updateAudioIndicators();

  // In hands-free mode, auto-stop after 2s of silence
  if (state.handsFree) {
    if (recognitionTimeout) clearInterval(recognitionTimeout);
    recognitionTimeout = setInterval(() => {
      if (Date.now() - lastResultTime > 2500 && finalTranscript) {
        stopListening();
      }
    }, 500);
  }
}

function stopListening() {
  if (recognitionTimeout) { clearInterval(recognitionTimeout); recognitionTimeout = null; }
  if (recognition) { try { recognition.stop(); } catch {} }
  state.listening = false;
  updateAudioIndicators();
}

function toggleListening() {
  if (state.listening) stopListening();
  else startListening();
}

function updateAudioIndicators() {
  // Update mic button style
  const micBtn = document.getElementById('micBtn');
  if (micBtn) {
    micBtn.classList.toggle('listening', state.listening);
  }
  // Update hands-free button
  const hfBtn = document.getElementById('hfBtn');
  if (hfBtn) {
    hfBtn.classList.toggle('active', state.handsFree);
    hfBtn.textContent = state.handsFree ? 'Hands-Free ON' : 'Hands-Free';
  }
  // Floating indicators
  let listenEl = document.getElementById('hfListenIndicator');
  let speakEl = document.getElementById('hfSpeakIndicator');
  if (state.listening && state.handsFree) {
    if (!listenEl) {
      listenEl = document.createElement('div');
      listenEl.id = 'hfListenIndicator';
      listenEl.className = 'hf-listening';
      listenEl.innerHTML = '<div class="dot"></div><div class="label">Listening...</div>';
      document.body.appendChild(listenEl);
    }
  } else {
    if (listenEl) listenEl.remove();
  }
  if (state.speaking && state.handsFree) {
    if (!speakEl) {
      speakEl = document.createElement('div');
      speakEl.id = 'hfSpeakIndicator';
      speakEl.className = 'hf-speaking';
      speakEl.innerHTML = '<div class="dot"></div><div class="label">Speaking...</div>';
      document.body.appendChild(speakEl);
    }
  } else {
    if (speakEl) speakEl.remove();
  }
}

function toggleHandsFree() {
  state.handsFree = !state.handsFree;
  lsSet(LS_HANDSFREE, state.handsFree);
  if (!state.handsFree) {
    stopListening();
    stopSpeaking();
  }
  updateAudioIndicators();
}

// ============================================================
// SM-2 ALGORITHM
// ============================================================
function sm2Update(progress, evaluation) {
  const p = { ...progress };
  const now = new Date();
  p.last_reviewed = now.toISOString();

  if (evaluation === 'correct_confident') {
    p.times_correct++;
    p.ease_factor = Math.min(3.0, p.ease_factor + 0.1);
    p.interval_days = Math.max(1, p.interval_days === 0 ? 1 : p.interval_days * 2);
  } else if (evaluation === 'correct_hesitant') {
    p.times_correct++;
    p.interval_days = Math.max(1, p.interval_days === 0 ? 1 : p.interval_days * 1.5);
  } else {
    p.times_incorrect++;
    p.ease_factor = Math.max(1.3, p.ease_factor - 0.2);
    p.interval_days = 1;
  }

  if (p.interval_days > 21) p.state = 'mastered';
  else if (p.interval_days > 3) p.state = 'review';
  else if (p.times_correct + p.times_incorrect > 0) p.state = 'learning';
  else p.state = 'new';

  p.next_review = new Date(now.getTime() + p.interval_days * 86400000).toISOString();
  return p;
}

// ============================================================
// DATA
// ============================================================
async function loadConcepts() {
  const { data, error } = await sb.from('sm_concepts').select('*').order('module').order('sort_order');
  if (error) { console.error('Failed to load concepts:', error); return; }
  state.concepts = data || [];
}

function getProgress(conceptId) {
  return state.progress[conceptId] || {
    state: 'new', interval_days: 0, ease_factor: 2.5,
    next_review: new Date().toISOString(), times_correct: 0, times_incorrect: 0,
  };
}

function getModuleStats(module) {
  const concepts = state.concepts.filter(c => c.module === module);
  const counts = { new: 0, learning: 0, review: 0, mastered: 0, due: 0 };
  const now = new Date();
  concepts.forEach(c => {
    const p = getProgress(c.id);
    counts[p.state]++;
    if (p.state === 'new' || new Date(p.next_review) <= now) counts.due++;
  });
  const lastSession = state.sessions.filter(s => s.module === module).sort((a,b) => new Date(b.started_at) - new Date(a.started_at))[0];
  return { total: concepts.length, ...counts, lastSession };
}

function getWeakZones() {
  const weak = [];
  state.concepts.forEach(c => {
    const p = getProgress(c.id);
    if (p.times_incorrect >= 2 && p.state !== 'mastered') weak.push(c.name);
  });
  return weak;
}

function getStreak() {
  if (!state.sessions.length) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let checkDate = new Date(today);
  const sessionDates = new Set(state.sessions.map(s => {
    const d = new Date(s.started_at); d.setHours(0,0,0,0); return d.getTime();
  }));
  while (sessionDates.has(checkDate.getTime())) {
    streak++;
    checkDate.setDate(checkDate.getDate() - 1);
  }
  return streak;
}

function getDueConcepts(module) {
  const now = new Date();
  const concepts = state.concepts.filter(c => c.module === module);
  const due = [];
  const newItems = [];
  concepts.forEach(c => {
    const p = getProgress(c.id);
    if (p.state === 'new') newItems.push(c);
    else if (new Date(p.next_review) <= now) due.push(c);
  });
  due.sort((a, b) => new Date(getProgress(a.id).next_review) - new Date(getProgress(b.id).next_review));
  return [...due, ...newItems];
}

// ============================================================
// ROUTING
// ============================================================
function navigate(hash) { window.location.hash = hash; }

function getRoute() {
  const hash = window.location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) return { page: 'dashboard' };
  if (parts[0] === 'session' && parts[1]) return { page: 'session', module: parts[1] };
  if (parts[0] === 'progress' && parts[1]) return { page: 'progress', module: parts[1] };
  if (parts[0] === 'concept' && parts[1]) return { page: 'concept', id: parts[1] };
  if (parts[0] === 'summary') return { page: 'summary' };
  return { page: 'dashboard' };
}

async function router() {
  const route = getRoute();
  if (route.page !== 'session') {
    stopListening();
    stopSpeaking();
  }
  if (!state.concepts.length) { app.innerHTML = '<div class="loading">Loading concepts...</div>'; return; }
  switch (route.page) {
    case 'dashboard': renderDashboard(); break;
    case 'session': await renderSession(route.module); break;
    case 'progress': renderProgress(route.module); break;
    case 'concept': renderConceptDetail(route.id); break;
    case 'summary': renderSummary(); break;
    default: renderDashboard();
  }
}

  const streak = getStreak();
  const weakZones = getWeakZones();
  let html = headerHTML();

  html += `<div class="dash-streak"><div class="count">${streak}</div><div class="label">day streak</div></div>`;

  // Review banners
  for (const [mod, info] of Object.entries(MODULE_LABELS)) {

      html += `<div class="review-banner">
        <div>
          <div class="rb-text"><strong>Review Due:</strong> ${info.icon} ${info.name}</div>
          <div class="rb-count">${reviewCount} concept${reviewCount !== 1 ? 's' : ''} flagged or missed</div>
        </div>
        <button onclick="startReviewSession('${mod}')">Start Review</button>

    }
  }

  html += '<div class="module-grid">';
  for (const [mod, info] of Object.entries(MODULE_LABELS)) {
    const s = getModuleStats(mod);
    const pct = s.total ? {
      new: (s.new/s.total*100).toFixed(0),
      learning: (s.learning/s.total*100).toFixed(0),
      review: (s.review/s.total*100).toFixed(0),
      mastered: (s.mastered/s.total*100).toFixed(0),
    } : { new:100, learning:0, review:0, mastered:0 };
    const lastStr = s.lastSession ? new Date(s.lastSession.started_at).toLocaleDateString() : 'Never';
    html += `<div class="module-card">
      <h3>${info.icon} ${info.name}</h3>
      <div class="subtitle">${info.desc}</div>
      <div class="stats">
        <span><strong>${s.due}</strong> due</span>
        <span><strong>${s.total}</strong> concepts</span>
        <span>Last: <strong>${lastStr}</strong></span>
      </div>
      <div class="mastery-bar">
        <div class="seg new" style="width:${pct.new}%"></div>
        <div class="seg learning" style="width:${pct.learning}%"></div>
        <div class="seg review" style="width:${pct.review}%"></div>
        <div class="seg mastered" style="width:${pct.mastered}%"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-start" onclick="startSession('${mod}')">Start Session</button>
        <a href="#/progress/${mod}" style="padding:8px 14px;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:13px;display:flex;align-items:center;text-decoration:none">Progress</a>
      </div>
    </div>`;
  }
  html += '</div>';

  if (weakZones.length) {
    html += `<div class="weak-zones"><h3>Weak Zones</h3><div>${weakZones.map(z => `<span class="zone">${z}</span>`).join('')}</div></div>`;
  }

  app.innerHTML = html;
}

// ============================================================
// SESSION
// ============================================================
window.startSession = async function(module) {
  const due = getDueConcepts(module);
  if (!due.length) { alert('No concepts due for review!'); return; }

  state.activeSession = {
    id: crypto.randomUUID(), module, started_at: new Date().toISOString(),
    ended_at: null, items_reviewed: 0, items_correct: 0, items_incorrect: 0,
  };
  state.activeModule = module;
  state.sessionConcepts = due.slice(0, 10);
  state.currentConceptIdx = 0;
  state.messages = [];
  state.chatDisplay = [];
  state.sessionTimer = 0;
  state.sending = false;
  state.sessionEvals = {};

  navigate(`/session/${module}`);
};

async function renderSession(module) {
  if (!state.activeSession || state.activeModule !== module) {
    navigate('/');
    return;
  }

  const concept = state.sessionConcepts[state.currentConceptIdx];

  let html = `<div class="session-header">
    <div class="concept">\u{1F4CC} ${concept ? concept.name : 'Complete'}</div>
    <div class="controls">
      <button class="btn-handsfree ${state.handsFree ? 'active' : ''}" id="hfBtn" onclick="toggleHandsFree()">${state.handsFree ? 'Hands-Free ON' : 'Hands-Free'}</button>
      <div class="timer" id="timer">00:00</div>
      <button class="btn-end" id="endSessionBtn">End</button>
    </div>
  </div>`;

  html += '<div class="chat" id="chat">';
  state.chatDisplay.forEach(m => {
    if (m.role === 'assistant') {
      html += `<div class="msg assistant">${marked.parse(m.content)}</div>`;
    } else {
      html += `<div class="msg user">${escapeHtml(m.content)}</div>`;
    }
  });
  if (state.sending) html += '<div class="typing">Thinking...</div>';
  html += '</div>';

  html += `<div class="input-bar"><form id="chatForm">
    <button type="button" class="btn-mic ${state.listening ? 'listening' : ''}" id="micBtn" onclick="toggleListening()">${MIC_SVG}</button>
    <textarea id="chatInput" rows="1" placeholder="${state.handsFree ? 'Hands-free mode — speak your answer' : 'Type or tap mic to speak...'}" ${state.sending ? 'disabled' : ''}></textarea>
    <button type="submit" ${state.sending ? 'disabled' : ''}>Send</button>
  </form></div>`;

  app.innerHTML = html;

  // Timer
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.sessionTimer++;
    const m = Math.floor(state.sessionTimer / 60).toString().padStart(2, '0');
    const s = (state.sessionTimer % 60).toString().padStart(2, '0');
    const el = document.getElementById('timer');
    if (el) el.textContent = `${m}:${s}`;
  }, 1000);

  if (state.chatDisplay.length === 0) {
    await callTutor('start_session');
  }

  bindSessionForm();
  document.getElementById('endSessionBtn').onclick = () => endSession();
  scrollChat();
}

function bindSessionForm() {
  const form = document.getElementById('chatForm');
  if (!form) return;
  form.onsubmit = async (e) => {
    e.preventDefault();
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || state.sending) return;
    input.value = '';
    stopListening();
    await sendMessage(text);
  };
  const input = document.getElementById('chatInput');
  if (input) {
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.dispatchEvent(new Event('submit')); }
    });
    if (!state.handsFree) input.focus();
  }
}

async function sendMessage(text) {
  state.messages.push({ role: 'user', content: text });
  state.chatDisplay.push({ role: 'user', content: text });
  state.sending = true;
  reRenderChat();
  await callTutor('respond');
}

async function callTutor(action) {
  const concept = state.sessionConcepts[state.currentConceptIdx];
  const weakZones = getWeakZones();

  try {
    state.sending = true;
    reRenderChat();

    const body = {
      action,
      module: state.activeModule,
      messages: state.messages,
      concepts: state.sessionConcepts.map(c => ({
        name: c.name, category: c.category, subcategory: c.subcategory, difficulty: c.difficulty,
      })),
      weakZones,
      currentConcept: concept?.name,
    };

    const res = await fetch(TUTOR_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (data.error) console.error('Tutor error:', data);

    const content = data.content || data.error || 'No response';
    state.messages.push({ role: 'assistant', content });
    state.chatDisplay.push({ role: 'assistant', content, evaluation: data.evaluation });

    if (data.evaluation && concept) {
      handleEvaluation(data.evaluation, concept);
    }

    if (data.nextConcept) {
      const nextIdx = state.sessionConcepts.findIndex(c =>
        c.name.toLowerCase().includes(data.nextConcept.toLowerCase())
      );
      if (nextIdx > state.currentConceptIdx) {
        state.currentConceptIdx = nextIdx;
      } else if (state.currentConceptIdx < state.sessionConcepts.length - 1) {
        state.currentConceptIdx++;
      }
    }

    // Hands-free: speak the response, then auto-listen
    if (state.handsFree) {
      speak(content, () => {
        if (state.handsFree && state.activeSession && !state.sending) {
          setTimeout(() => startListening(), 500);
        }
      });
    }
  } catch (err) {
    console.error('Tutor call failed:', err);
    state.chatDisplay.push({ role: 'assistant', content: `Error: ${err.message}` });
  }

  state.sending = false;
  reRenderChat();
  scrollChat();
}

function handleEvaluation(evaluation, concept) {
  showEvalFlash(evaluation);
  let p = getProgress(concept.id);
  const updated = sm2Update(p, evaluation);
  state.progress[concept.id] = updated;
  saveProgress();
  // Track per-concept eval for summary checkboxes
  if (evaluation === 'incorrect') {
    state.sessionEvals[concept.id] = 'incorrect';
  } else if (!state.sessionEvals[concept.id] || state.sessionEvals[concept.id] !== 'incorrect') {
    state.sessionEvals[concept.id] = 'correct';
  }
  const sess = state.activeSession;
  if (sess) {
    sess.items_reviewed++;
    if (evaluation === 'correct_confident' || evaluation === 'correct_hesitant') sess.items_correct++;
    else sess.items_incorrect++;
  }
}

function showEvalFlash(evaluation) {
  const el = document.createElement('div');
  el.className = `eval-flash ${evaluation}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function reRenderChat() {
  const chat = document.getElementById('chat');
  if (!chat) return;
  let html = '';
  state.chatDisplay.forEach(m => {
    if (m.role === 'assistant') {
      html += `<div class="msg assistant">${marked.parse(m.content)}</div>`;
    } else {
      html += `<div class="msg user">${escapeHtml(m.content)}</div>`;
    }
  });
  if (state.sending) html += '<div class="typing">Thinking...</div>';
  chat.innerHTML = html;

  const concept = state.sessionConcepts[state.currentConceptIdx];
  const conceptEl = document.querySelector('.session-header .concept');
  if (conceptEl && concept) conceptEl.textContent = `\u{1F4CC} ${concept.name}`;

  const input = document.getElementById('chatInput');
  const btn = document.querySelector('.input-bar button[type="submit"]');
  if (input) { input.disabled = state.sending; if (!state.sending && !state.handsFree) input.focus(); }
  if (btn) btn.disabled = state.sending;
}

function scrollChat() {
  setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
}

function endSession() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  stopListening();
  stopSpeaking();
  // Auto-flag concepts you got wrong
  for (const [id, result] of Object.entries(state.sessionEvals)) {
    if (result === 'incorrect') state.flagged[id] = true;
  }
  saveFlagged();
  if (state.activeSession) {
    state.activeSession.ended_at = new Date().toISOString();
    state.sessions.push(state.activeSession);
    saveSessions();
  }
  navigate('/summary');
}

// ============================================================
// SUMMARY
// ============================================================
function renderSummary() {
  const s = state.activeSession || { items_reviewed: 0, items_correct: 0, items_incorrect: 0 };
  const pct = s.items_reviewed ? Math.round(s.items_correct / s.items_reviewed * 100) : 0;
  const m = Math.floor(state.sessionTimer / 60);
  const sec = state.sessionTimer % 60;
  const isReview = s.isReview || false;

  // Build concept checklist
  let conceptsHTML = '';
  if (state.sessionConcepts.length) {
    conceptsHTML = '<div class="summary-concepts"><h3>Flag concepts for review</h3>';
    state.sessionConcepts.forEach(c => {
      const evalResult = state.sessionEvals[c.id] || 'none';
      const isFlagged = !!state.flagged[c.id];
      conceptsHTML += `<label class="summary-concept-row">
        <span class="eval-dot ${evalResult === 'incorrect' ? 'incorrect' : evalResult === 'correct' ? 'correct' : 'none'}"></span>
        <span class="sc-name">${c.name}</span>
        ${isFlagged ? '<span class="flag-label">REVIEW</span>' : ''}
        <input type="checkbox" ${isFlagged ? 'checked' : ''} onchange="toggleFlag('${c.id}', this.checked)">
      </label>`;
    });
    conceptsHTML += '</div>';
  }

  app.innerHTML = headerHTML('Session Complete') + `
    <div class="summary">
      <h2>${isReview ? 'Review Session Complete' : 'Session Summary'}</h2>
      <div class="stat-grid">
        <div class="stat"><div class="val blue">${s.items_reviewed}</div><div class="lbl">Items Reviewed</div></div>
        <div class="stat"><div class="val green">${pct}%</div><div class="lbl">Accuracy</div></div>
        <div class="stat"><div class="val">${m}m ${sec}s</div><div class="lbl">Duration</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="val green">${s.items_correct}</div><div class="lbl">Correct</div></div>
        <div class="stat"><div class="val red">${s.items_incorrect}</div><div class="lbl">Incorrect</div></div>
        <div class="stat"><div class="val">${state.sessionConcepts.length}</div><div class="lbl">Concepts</div></div>
      </div>
      ${conceptsHTML}
      <button onclick="navigate('/')">Back to Dashboard</button>
    </div>`;
  state.activeSession = null;
}

window.toggleFlag = function(conceptId, checked) {
  if (checked) {
    state.flagged[conceptId] = true;
  } else {
    delete state.flagged[conceptId];
  }
  saveFlagged();
};

// ============================================================
// PROGRESS
// ============================================================
function renderProgress(module) {
  const info = MODULE_LABELS[module] || { name: module, icon: '\u{1F4DA}' };
  const concepts = state.concepts.filter(c => c.module === module);
  const now = new Date();

  const categories = {};
  concepts.forEach(c => {
    if (!categories[c.category]) categories[c.category] = [];
    categories[c.category].push(c);
  });

  const dueToday = concepts.filter(c => { const p = getProgress(c.id); return p.state === 'new' || new Date(p.next_review) <= now; }).length;
  const dueTomorrow = concepts.filter(c => { const p = getProgress(c.id); const nr = new Date(p.next_review); const tom = new Date(now); tom.setDate(tom.getDate()+1); tom.setHours(23,59,59); return nr > now && nr <= tom; }).length;
  const dueWeek = concepts.filter(c => { const p = getProgress(c.id); const nr = new Date(p.next_review); const wk = new Date(now); wk.setDate(wk.getDate()+7); return nr > now && nr <= wk; }).length;

  let html = headerHTML(`${info.icon} ${info.name}`);

  html += `<div class="progress-tabs">
    ${Object.entries(MODULE_LABELS).map(([m, i]) =>
      `<button class="${m===module?'active':''}" onclick="navigate('/progress/${m}')">${i.icon} ${i.name}</button>`
    ).join('')}
  </div>`;

  html += `<div class="due-forecast">
    <h3>Due Forecast</h3>
    <div class="row"><span>Today</span><strong>${dueToday}</strong></div>
    <div class="row"><span>Tomorrow</span><strong>${dueTomorrow}</strong></div>
    <div class="row"><span>This week</span><strong>${dueWeek}</strong></div>
  </div>`;

  for (const [cat, items] of Object.entries(categories)) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px;color:var(--text2)">${cat}</h3>`;
    html += '<div class="concept-list">';
    items.forEach(c => {
      const p = getProgress(c.id);
      const dueStr = p.state === 'new' ? 'New' : (new Date(p.next_review) <= now ? 'Due now' : `Due ${new Date(p.next_review).toLocaleDateString()}`);
      html += `<div class="concept-row" onclick="navigate('/concept/${c.id}')">
        <div class="dot ${p.state}"></div>
        <div class="name">${c.name}</div>
        <div class="meta">${dueStr}</div>
      </div>`;
    });
    html += '</div>';
  }

  const modSessions = state.sessions.filter(s => s.module === module).sort((a,b) => new Date(b.started_at) - new Date(a.started_at));
  if (modSessions.length) {
    html += '<div class="session-history"><h3>Session History</h3>';
    modSessions.slice(0, 10).forEach(s => {
      const pct = s.items_reviewed ? Math.round(s.items_correct / s.items_reviewed * 100) : 0;
      html += `<div class="session-row">
        <span>${new Date(s.started_at).toLocaleDateString()} ${new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
        <span>${s.items_reviewed} items \u00B7 ${pct}% accuracy</span>
      </div>`;
    });
    html += '</div>';
  }

  app.innerHTML = html;
}

// ============================================================
// CONCEPT DETAIL
// ============================================================
function renderConceptDetail(id) {
  const c = state.concepts.find(x => x.id === id);
  if (!c) { navigate('/'); return; }
  const p = getProgress(c.id);
  const info = MODULE_LABELS[c.module] || { name: c.module };

  let html = headerHTML(info.name);
  html += `<div class="concept-detail">
    <h2>${c.name}</h2>
    <div class="cat">${c.category}${c.subcategory ? ' / ' + c.subcategory : ''} \u00B7 Difficulty: ${'\u2605'.repeat(c.difficulty)}${'\u2606'.repeat(5 - c.difficulty)}</div>
    <div class="desc">${c.description || 'No description yet.'}</div>
    <div class="tags">${(c.tags || []).map(t => `<span>${t}</span>`).join('')}</div>
    <div class="sm2-state">
      <div class="item"><div class="lbl">State</div><div class="val" style="color:var(--${p.state==='mastered'?'green':p.state==='review'?'accent':p.state==='learning'?'yellow':'text2'})">${p.state}</div></div>
      <div class="item"><div class="lbl">Interval</div><div class="val">${p.interval_days ? p.interval_days.toFixed(1) + 'd' : '\u2014'}</div></div>
      <div class="item"><div class="lbl">Ease Factor</div><div class="val">${p.ease_factor.toFixed(2)}</div></div>
      <div class="item"><div class="lbl">Next Review</div><div class="val" style="font-size:14px">${p.state === 'new' ? 'Not started' : new Date(p.next_review).toLocaleDateString()}</div></div>
      <div class="item"><div class="lbl">Correct</div><div class="val" style="color:var(--green)">${p.times_correct}</div></div>
      <div class="item"><div class="lbl">Incorrect</div><div class="val" style="color:var(--red)">${p.times_incorrect}</div></div>
    </div>
    <button class="btn-drill" onclick="drillConcept('${c.id}','${c.module}')">Drill Now</button>
  </div>`;

  app.innerHTML = html;
}

window.startReviewSession = async function(module) {
  const reviewConcepts = getReviewConcepts(module);
  if (!reviewConcepts.length) { alert('No concepts to review!'); return; }

  state.activeSession = {
    id: crypto.randomUUID(), module, started_at: new Date().toISOString(),
    ended_at: null, items_reviewed: 0, items_correct: 0, items_incorrect: 0, isReview: true,
  };
  state.activeModule = module;
  state.sessionConcepts = reviewConcepts.slice(0, 10);
  state.currentConceptIdx = 0;
  state.messages = [];
  state.chatDisplay = [];
  state.sessionTimer = 0;
  state.sending = false;
  state.sessionEvals = {};

  // Mark review date
  state.lastReviewDates[module] = new Date().toISOString();
  saveLastReview();

  navigate(`/session/${module}`);
};

window.drillConcept = async function(conceptId, module) {
  const concept = state.concepts.find(c => c.id === conceptId);
  if (!concept) return;
  state.activeSession = {
    id: crypto.randomUUID(), module, started_at: new Date().toISOString(),
    ended_at: null, items_reviewed: 0, items_correct: 0, items_incorrect: 0,
  };
  state.activeModule = module;
  state.sessionConcepts = [concept];
  state.currentConceptIdx = 0;
  state.messages = [];
  state.chatDisplay = [];
  state.sessionTimer = 0;
  state.sending = false;
  navigate(`/session/${module}`);
};

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

window.navigate = navigate;
window.toggleHandsFree = toggleHandsFree;
window.toggleListening = toggleListening;

// ============================================================
// INIT
// ============================================================
window.addEventListener('hashchange', router);

(async () => {
  await loadConcepts();
  if (getSyncKey()) await cloudLoad();
  router();
})();
</script>
